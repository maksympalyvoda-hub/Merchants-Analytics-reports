<!DOCTYPE html><script type="application/json" id="cowork-artifact-meta">
{
  "name": "Careem Merchant Portal Nav",
  "schemaVersion": 1,
  "description": "Interactive Careem Merchant Portal navigation preview — 3-level side nav with accordion behaviour, active state highlighting, and dark teal top bar. Matches the Figma design system exactly."
}
</script>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Careem Merchant Portal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden}
:root{
  --c-brand:#00493E;--c-dark:#00342C;
  --c-active:#008470;--c-active-bg:rgba(155,253,211,0.30);
  --c-hover:rgba(0,73,62,0.06);
  --c-txt-pri:#282D33;--c-txt-sec:#44505C;--c-txt-ter:#606161;--c-txt-info:#232424;
  --c-white:#FFFFFF;--c-bg-sec:#F3F5F5;--c-bg-page:#F0F2F2;
  --c-border:#D4D6D6;--c-card:#F3F5F5;
  --shadow:0px 2px 8px rgba(0,0,0,0.16);
  --r-md:8px;--r-sm:4px;
  --nav-w:240px;--bar-h:56px;
  --font:'Careem Sans','Inter',system-ui,sans-serif;
}
body{font-family:var(--font);font-size:14px;color:var(--c-txt-pri);background:var(--c-bg-page);-webkit-font-smoothing:antialiased}
a,button{cursor:pointer;border:none;background:none;font:inherit;color:inherit;text-decoration:none}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--nav-w);min-width:var(--nav-w);display:flex;flex-direction:column;background:var(--c-white);box-shadow:var(--shadow);overflow-y:auto;overflow-x:hidden;flex-shrink:0;z-index:90;scrollbar-width:thin;scrollbar-color:var(--c-border) transparent}
.sb-header{display:flex;align-items:flex-end;justify-content:space-between;padding:20px 20px 16px;border-bottom:1px solid var(--c-border);flex-shrink:0}
.lang-btn{display:flex;align-items:center;gap:4px;color:var(--c-txt-ter)}
.lang-txt{font-weight:600;font-size:12px;line-height:16px}
.nav-content{display:flex;flex-direction:column;gap:12px;padding:20px 0 8px;flex:1}
.nav-section{display:flex;flex-direction:column}
.sec-title{font-weight:700;font-size:11px;letter-spacing:0.08em;color:var(--c-txt-ter);padding:0 20px;margin-bottom:2px}
.l1-list{display:flex;flex-direction:column;padding:0 6px}
.l1-leaf,.l1-btn{display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:var(--r-md);color:var(--c-txt-pri);width:100%;text-align:left;transition:background .14s}
.l1-leaf:hover,.l1-btn:hover{background:var(--c-hover)}
.l1-leaf.is-active{color:var(--c-active)}
.l1-btn.is-open{background:var(--c-active-bg)}
.ico{display:flex;align-items:center;justify-content:center;width:22px;height:22px;flex-shrink:0;color:inherit}
.l1-body{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.l1-lbl{font-weight:300;font-size:14px;line-height:22px;color:inherit;white-space:normal}
.l1-btn.is-open .l1-lbl{font-weight:600}
.l1-sub{font-size:12px;line-height:18px;color:var(--c-txt-sec)}
.chev{flex-shrink:0;color:inherit;transition:transform .2s}
.l1-btn .chev{transform:rotate(-90deg)}
.l1-btn.is-open .chev{transform:rotate(0deg)}
.l2-panel{overflow:hidden;max-height:0;transition:max-height .22s ease}
.l2-panel.is-open{max-height:1200px}
.l2-group{border-left:2px solid var(--c-border);margin-left:17px;display:flex;flex-direction:column}
.l2-group.g-active{border-left-color:var(--c-active)}
.l2-btn,.l2-leaf{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:9px 14px 9px 10px;border-radius:var(--r-md);width:100%;text-align:left;color:var(--c-txt-info);transition:background .14s}
.l2-btn:hover,.l2-leaf:hover{background:var(--c-hover)}
.l2-btn.is-open{color:var(--c-active)}
.l2-leaf.is-active{color:var(--c-active)}
.l2-lbl{font-weight:600;font-size:13px;line-height:20px;color:inherit}
.l2-chev{flex-shrink:0;transition:transform .2s}
.l2-btn .l2-chev{transform:rotate(0deg)}
.l2-btn.is-open .l2-chev{transform:rotate(90deg)}
.l3-panel{overflow:hidden;max-height:0;transition:max-height .2s ease;border-left:1px solid var(--c-border);margin-left:10px}
.l3-panel.is-open{max-height:800px}
.l3-leaf{display:block;padding:7px 10px;font-weight:500;font-size:12px;line-height:18px;color:var(--c-txt-info);border-radius:var(--r-md);transition:background .14s}
.l3-leaf:hover{background:var(--c-hover)}
.l3-leaf.is-active{color:var(--c-active)}
.sb-footer{padding:4px 6px 12px;flex-shrink:0;margin-top:auto}
.user-card{display:flex;align-items:center;gap:10px;padding:10px;background:var(--c-bg-sec);border-radius:var(--r-md);width:100%;text-align:left;transition:background .14s}
.user-card:hover{background:#e4e7e7}
.u-info{display:flex;flex-direction:column;gap:2px;flex:1}
.u-name{font-weight:600;font-size:14px;line-height:22px;color:var(--c-txt-pri)}
.u-status{font-size:12px;line-height:18px;color:var(--c-txt-sec)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#topbar{height:var(--bar-h);background:var(--c-dark);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;position:relative;z-index:20}
.outlet-btn{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.18);border-radius:8px;padding:6px 12px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:background .15s,border-color .15s}
.outlet-btn:hover{background:rgba(255,255,255,0.20)}
.outlet-btn.open{background:rgba(255,255,255,0.24);border-color:rgba(255,255,255,0.45)}
.bdot{width:8px;height:8px;border-radius:50%;background:#4ADE80;flex-shrink:0}
.bchv{flex-shrink:0;opacity:.75;transition:transform .2s}
.outlet-btn.open .bchv{transform:rotate(180deg)}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-btn{background:rgba(255,255,255,0.12);border:none;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:background .15s}
.tb-btn:hover{background:rgba(255,255,255,0.22)}
.av{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
#sel-panel{display:none;position:absolute;top:var(--bar-h);left:0;right:0;background:#fff;border-bottom:1px solid var(--c-border);box-shadow:0 8px 24px rgba(0,0,0,0.13);z-index:50;animation:sd .18s ease-out}
@keyframes sd{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
#sel-overlay{display:none;position:fixed;top:var(--bar-h);left:var(--nav-w);right:0;bottom:0;z-index:40}
#sel-cols{display:flex;border-bottom:1px solid var(--c-border)}
.sc{flex:1;min-width:0;display:flex;flex-direction:column;border-right:1px solid var(--c-border);max-height:320px}
.sc:last-child{border-right:none}
.sc-hdr{padding:10px 14px 8px;font-size:10px;font-weight:700;color:var(--c-txt-ter);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #F0F1F1;flex-shrink:0}
.sc-list{flex:1;overflow-y:auto;padding:4px 0}
.sc-list::-webkit-scrollbar{width:4px}
.sc-list::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:2px}
.sc-row{display:flex;align-items:flex-start;gap:8px;padding:7px 14px;cursor:pointer;font-size:13px;color:var(--c-txt-sec);transition:background .1s;user-select:none}
.sc-row:hover{background:#F5F5F5}
.sc-row.all-row{font-weight:600;color:var(--c-txt-pri);border-bottom:1px solid #F0F1F1;margin-bottom:2px}
.sc-row input[type=checkbox]{width:15px;height:15px;flex-shrink:0;margin-top:2px;accent-color:var(--c-active);cursor:pointer}
.o-lbl{display:flex;flex-direction:column;gap:1px}
.o-meta{font-size:11px;color:var(--c-txt-ter)}
.sc-empty{padding:12px 14px;font-size:12px;color:#AAADB0;font-style:italic}
#sel-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:#FAFAFA;border-top:1px solid #F0F1F1}
.sel-info{font-size:13px;color:var(--c-txt-ter)}
.sel-info strong{color:var(--c-active);font-weight:600}
.sel-acts{display:flex;gap:8px}
.btn-reset{padding:7px 16px;border:1px solid var(--c-border);background:#fff;color:var(--c-txt-sec);border-radius:8px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600}
.btn-reset:hover{background:#F5F5F5}
.btn-apply{padding:7px 16px;border:none;background:var(--c-dark);color:#00E784;border-radius:8px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600}
.btn-apply:hover{background:var(--c-brand)}
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px;scroll-behavior:smooth}
.flt-bar{display:none;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--c-active-bg);border:1px solid rgba(0,132,112,.2);border-radius:8px;margin-bottom:20px}
.flt-bar.show{display:flex}
.flt-txt{font-size:13px;color:var(--c-active);font-weight:500}
.flt-clr{font-size:12px;color:var(--c-active);font-weight:600;cursor:pointer;text-decoration:underline;background:none;border:none;font-family:var(--font)}
.pg-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:320px;gap:12px;color:var(--c-txt-ter)}
.pg-empty-title{font-size:18px;font-weight:600;color:var(--c-txt-sec)}
.pg-empty-sub{font-size:13px}

/* ── Sales Performance ── */
.sp-page{display:flex;flex-direction:column;gap:20px}
.sp-updated{font-size:12px;color:#434545;padding-bottom:4px}
.sp-cards{display:flex;gap:16px}
.sp-card{background:#fff;border:1px solid #F0F5F4;border-radius:8px;padding:16px;flex:1;min-width:0}
.sp-card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sp-card-title{font-size:14px;font-weight:600;color:#202121}
.sp-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:4px;font-size:12px;font-weight:600}
.sp-tag.up{background:#DCFAF5;color:#00493E}
.sp-tag.down{background:#FFE6E6;color:#B81919}
.sp-card-body{display:flex;gap:24px;align-items:flex-end}
.sp-card-main .sp-val{font-size:20px;font-weight:600;color:#202121;line-height:28px}
.sp-card-main .sp-lbl{font-size:16px;color:#5C5E5E;line-height:24px}
.sp-card-sec .sp-sval{font-size:14px;font-weight:600;color:#202121}
.sp-card-sec .sp-sunit{font-size:12px;font-weight:600;color:#202121}
.sp-card-sec .sp-slbl{font-size:12px;color:#5C5E5E}
.sp-card-lg{background:#fff;border:1px solid #F0F5F4;border-radius:8px;padding:24px;scroll-margin-top:16px}
.sp-sec-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.sp-sec-left{display:flex;flex-direction:column;gap:8px}
.sp-sec-title{font-size:20px;font-weight:600;color:#202121;line-height:28px}
.sp-sec-sub{font-size:16px;color:#5C5E5E;line-height:24px}
.sp-sec-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;align-self:stretch;gap:12px}
.sp-export-btn{padding:5px 16px;border:1px solid #899BAD;background:#fff;color:#44505C;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;height:32px;display:flex;align-items:center;gap:6px}
.sp-dl-btn{padding:5px 17px;border:1px solid #00E784;background:#00E784;color:#282D33;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;height:32px;display:flex;align-items:center}
.sp-stat{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.sp-stat-row{display:flex;align-items:center;gap:10px}
.sp-stat-val{font-size:20px;font-weight:600;color:#202121}
.sp-stat-unit{font-size:14px;font-weight:600;color:#202121}
.sp-stat-lbl{font-size:14px;color:#5C5E5E}
.sp-controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.sp-controls-left{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.sp-seg{display:flex;background:#F0F5F4;border-radius:4px;padding:2px;align-self:flex-start}
.sp-seg-item{padding:7px 12px;border-radius:2px;font-size:20px;font-weight:600;color:#44505C;cursor:pointer;line-height:28px}
.sp-seg-item.active{background:#fff;color:#282D33;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.sp-range{display:flex;border:1px solid #F0F5F4;border-radius:4px;height:38px;overflow:visible}
.sp-range-item{padding:0 16px;font-size:14px;color:#202121;cursor:pointer;border-right:1px solid #F0F5F4;display:flex;align-items:center;white-space:nowrap}
.sp-range-item:last-child{border-right:none}
.sp-range-item.active{background:#DCFAF5;color:#008470;font-weight:600;border:1px solid #008470;border-radius:4px;margin:-1px}
.sp-compared{font-size:12px;color:#434545}
.sp-tabs{display:flex;gap:32px}
.sp-tab{padding:8px 0;font-size:14px;font-weight:600;color:#282D33;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.sp-tab.active{color:#008470;border-bottom-color:#008470}
.sp-chart-wrap{position:relative;width:100%}
.sp-chart-footer{display:flex;justify-content:space-between;align-items:center;padding-top:16px}
.sp-compare{display:flex;align-items:center;gap:10px;font-size:14px;color:#5C5E5E}
.sp-switch{width:44px;height:22px;background:#E3E8E7;border-radius:16px;position:relative;cursor:pointer;flex-shrink:0}
.sp-switch-nob{position:absolute;left:2px;top:2px;width:18px;height:18px;background:#fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.16)}
.sp-legend-item{display:flex;align-items:center;gap:8px;font-size:14px;color:#5C5E5E}
.sp-legend-dot{width:8px;height:8px;border-radius:50%;background:#001942;flex-shrink:0}
.sp-tbl-wrap{overflow:hidden;border-radius:4px}
.sp-tbl{width:100%;border-collapse:collapse}
.sp-tbl th{background:#F0F5F4;padding:12px 16px;font-size:14px;font-weight:600;color:#434545;cursor:pointer;user-select:none;white-space:nowrap}
.sp-tbl th:first-child{text-align:left;border-radius:4px 0 0 4px}
.sp-tbl th:last-child{border-radius:0 4px 4px 0}
.sp-tbl th:not(:first-child){text-align:right}
.sp-tbl td{padding:16px;border-bottom:1px solid #F0F5F4;font-size:14px;color:#202121}
.sp-tbl td:not(:first-child){text-align:right}
.sp-sort{display:inline-flex;flex-direction:column;margin-left:6px;opacity:.5;font-size:9px;line-height:1;vertical-align:middle}
.sp-pages{display:flex;justify-content:center;align-items:center;gap:2px;padding-top:20px}
.sp-pg-btn{min-width:24px;height:22px;padding:0 6px;display:flex;align-items:center;justify-content:center;font-size:14px;border-radius:2px;cursor:pointer;color:#282D33;border:1px solid transparent}
.sp-pg-btn.active{border-color:#008470;color:#008470;font-weight:600}
.sp-two{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.sp-donut-wrap{display:flex;align-items:center;justify-content:space-between;gap:24px;padding-top:8px}
.sp-donut-chart{position:relative;width:200px;height:200px;flex-shrink:0}
.sp-donut-legend{display:flex;flex-direction:column;gap:12px}
.sp-dl-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#434545}
.sp-dl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sp-bar-wrap{position:relative;width:100%}

/* ── Operations Quality ── */
.oq-filter{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.oq-dl-btn{padding:0 20px;height:38px;background:#00342C;color:#00E784;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);display:flex;align-items:center;gap:6px;flex-shrink:0}
.oq-two{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.oq-with-panel{display:grid;grid-template-columns:1fr 260px;gap:20px;align-items:start}
.oq-red{color:#B81919!important;font-weight:600}
.oq-red-dot::before{content:'●';font-size:9px;color:#B81919;margin-right:5px;vertical-align:middle}
.oq-protip{background:#fff;border:1px solid #F0F5F4;border-radius:8px;overflow:hidden}
.oq-protip-hdr{padding:12px 16px;background:#F3F5F5;font-size:14px;font-weight:700;color:#282D33;border-bottom:1px solid #F0F5F4}
.oq-protip-body{padding:16px;display:flex;flex-direction:column;gap:10px}
.oq-protip-item{display:flex;gap:8px;font-size:13px;color:#44505C;line-height:1.5}
.oq-protip-dot{width:6px;height:6px;border-radius:50%;background:#008470;flex-shrink:0;margin-top:7px}
.oq-heatmap{width:100%;border-collapse:collapse;margin-top:4px}
.oq-heatmap th{background:#F0F5F4;padding:10px 14px;font-size:12px;font-weight:600;color:#434545;text-align:center;white-space:nowrap;border:1px solid #E8ECEC}
.oq-heatmap th:first-child{text-align:left}
.oq-heatmap td{padding:10px 14px;font-size:13px;font-weight:500;text-align:center;border:1px solid #E8ECEC;white-space:nowrap}
.oq-heatmap td:first-child{text-align:left;background:#fff!important;color:#282D33!important;font-weight:600}
.oq-hm-0{background:#f2f4f8;color:#282D33}
.oq-hm-1{background:#d0d7e6;color:#282D33}
.oq-hm-2{background:#b0bcd4;color:#282D33}
.oq-hm-3{background:#364b6e;color:#fff}
.oq-hm-legend{display:flex;align-items:center;gap:20px;padding-top:14px;flex-wrap:wrap}
.oq-hm-li{display:flex;align-items:center;gap:6px;font-size:12px;color:#5C5E5E}
.oq-hm-sw{width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,0.08)}
.oq-tabs{display:flex;gap:0;border-bottom:1px solid #F0F5F4;margin-bottom:16px}
.oq-tab{padding:10px 16px;font-size:14px;font-weight:600;color:#5C5E5E;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;margin-bottom:-1px}
.oq-tab.active{color:#008470;border-bottom-color:#008470}
.oq-tbl-sub{font-size:12px;color:#606161}
.oq-date-lbl{font-size:14px;color:#5C5E5E}
.oq-stat-row{display:flex;gap:24px;margin-bottom:16px;align-items:flex-end}
.oq-kv{display:flex;flex-direction:column;gap:2px}
.oq-kv-val{font-size:20px;font-weight:600;color:#202121;display:flex;align-items:center;gap:8px}
.oq-kv-lbl{font-size:13px;color:#5C5E5E}

/* ── Customer Insights ── */
.ci-seg-ctrl{display:flex;background:#F0F5F4;border-radius:4px;padding:2px;margin-bottom:16px;align-self:flex-start}
.ci-seg-item{padding:7px 16px;border-radius:2px;font-size:16px;font-weight:600;color:#44505C;cursor:pointer;line-height:24px}
.ci-seg-item.active{background:#fff;color:#282D33;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.ci-breakdown-layout{display:grid;grid-template-columns:280px 1fr;gap:60px;align-items:start;padding-top:24px}
.ci-donut-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.ci-donut-chart{width:240px;height:240px;position:relative}
.ci-donut-total{text-align:center}
.ci-donut-total-lbl{font-size:13px;color:#606161;margin-bottom:4px}
.ci-donut-total-val{font-size:20px;font-weight:600;color:#232424;display:flex;align-items:center;gap:8px;justify-content:center}
.ci-seg-stats{display:flex;flex-direction:column;gap:24px}
.ci-seg-row{display:flex;flex-direction:column;gap:6px}
.ci-seg-header{display:flex;align-items:center;gap:10px}
.ci-seg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.ci-seg-name{font-size:16px;font-weight:600;color:#232424}
.ci-seg-desc{font-size:13px;color:#606161;padding-left:22px}
.ci-seg-metrics{display:flex;align-items:center;padding-left:22px;margin-top:4px}
.ci-seg-metric{display:flex;flex-direction:column;gap:2px;padding-right:24px}
.ci-seg-metric-val{font-size:16px;font-weight:600;color:#232424}
.ci-seg-metric-lbl{font-size:12px;color:#606161}
.ci-seg-divider{width:1px;height:52px;background:#F3F5F5;margin-right:24px;flex-shrink:0}
.ci-with-sidebar{display:grid;grid-template-columns:1fr 260px;gap:20px;align-items:start}
.ci-protip{background:#fff;border:1px solid #F0F5F4;border-radius:8px;overflow:hidden}
.ci-protip-hdr{padding:12px 16px;background:#F3F5F5;font-size:14px;font-weight:700;color:#282D33;border-bottom:1px solid #F0F5F4}
.ci-protip-body{padding:16px;display:flex;flex-direction:column;gap:14px}
.ci-cplus-badge{display:inline-flex;align-items:center;padding:3px 10px;background:#00342C;color:#00E784;border-radius:4px;font-size:12px;font-weight:700;width:fit-content;letter-spacing:0.02em}
.ci-protip-section{display:flex;flex-direction:column;gap:8px}
.ci-protip-section-title{font-size:14px;font-weight:600;color:#232424}
.ci-protip-section-body{font-size:13px;color:#474747;line-height:1.6}
.ci-protip-cta{padding:7px 16px;border:1px solid #D4D6D6;background:#fff;color:#232424;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;width:100%;font-family:var(--font);margin-top:4px}
.ci-star{color:#F5A623;font-size:14px}
.ci-funnel-container{padding-top:8px}
.ci-funnel-labels{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:20px}
.ci-funnel-label{display:flex;flex-direction:column;gap:4px}
.ci-funnel-drop{font-size:11px;font-weight:600;color:#B81919;background:#FFE6E6;border-radius:4px;padding:2px 8px;display:inline-flex;align-items:center;gap:3px;margin-bottom:4px;width:fit-content}
.ci-funnel-pct{font-size:22px;font-weight:600;color:#232424}
.ci-funnel-name{font-size:14px;font-weight:600;color:#232424}
.ci-funnel-desc{font-size:12px;color:#606161;line-height:1.5}
.ci-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.ci-kpi-card{background:#F3F5F5;border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:6px}
.ci-kpi-val{font-size:22px;font-weight:600;color:#232424;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ci-kpi-lbl{font-size:12px;color:#606161}
.ci-kpi-sub{font-size:11px;color:#606161;margin-top:2px}
.ci-disc-insight{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:#F3F5F5;border-radius:8px;margin-top:16px;font-size:13px;color:#44505C;line-height:1.5}
.ci-disc-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.ci-cohort-table{width:100%;border-collapse:collapse;font-size:12px}
.ci-cohort-table th{background:#F0F5F4;padding:9px 12px;font-size:11px;font-weight:600;color:#434545;text-align:center;border:1px solid #E8ECEC;white-space:nowrap}
.ci-cohort-table th:first-child,.ci-cohort-table th:nth-child(2){text-align:left}
.ci-cohort-table td{padding:9px 12px;text-align:center;border:1px solid #E8ECEC;font-size:12px;font-weight:500;white-space:nowrap}
.ci-cohort-table td:first-child,.ci-cohort-table td:nth-child(2){text-align:left;background:#fff!important;color:#282D33!important;font-weight:600}
.ci-coh-empty{background:#FAFAFA;color:#D4D6D6}
.ci-coh-0{background:#fff;color:#282D33}
.ci-coh-1{background:#DCFAF5;color:#00493E}
.ci-coh-2{background:#9DC9C3;color:#003830}
.ci-coh-3{background:#336D65;color:#fff}
.ci-coh-4{background:#00342C;color:#fff}
.ci-cltv-row{display:flex;gap:16px;margin-top:20px}
.ci-cltv-card{flex:1;border:1px solid #F0F5F4;border-radius:8px;padding:16px;background:#fff}
.ci-cltv-title{font-size:12px;color:#606161;margin-bottom:4px}
.ci-cltv-val{font-size:18px;font-weight:600;color:#232424}

const NAV=[

const SALES_PATHS=new Set(['/analytics/sales/orders-sales','/analytics/sales/gross-sales','/analytics/sales/avg-order-value','/analytics/sales/meal-breakdown','/analytics/sales/avg-order-mealtime']);

const PATH_TO_OPS_SEC={'/analytics/ops-quality/partner-cancellations':'sec-partner-cancel','/analytics/ops-quality/defects':'sec-defects','/analytics/ops-quality/outlet-performance':'sec-outlet-perf','/analytics/ops-quality/order-prep-efficiency':'sec-order-prep-eff','/analytics/ops-quality/order-prep-breakdown':'sec-order-prep-bk','/analytics/ops-quality/avg-acceptance-time':'sec-avg-accept','/analytics/ops-quality/offline-time':'sec-offline'};

const PATH_TO_CUST_SEC={'/analytics/customer/customer-breakdown':'sec-cust-breakdown','/analytics/customer/no-of-customers':'sec-no-customers','/analytics/customer/ratings-food-orders':'sec-ratings','/analytics/customer/conversion-funnel':'sec-cust-funnel','/analytics/customer/order-frequency':'sec-order-freq','/analytics/customer/reorder-rate':'sec-reorder-rate','/analytics/customer/impressions':'sec-impressions','/analytics/customer/discount-impact':'sec-discount-impact','/analytics/customer/retention':'sec-retention'};

let activePath='/dashboard',openL1=null,openL2=null,chartInstances={},scrollSpyCleanup=null;

function flatFind(path){for(const s of NAV)for(const l1 of s.items){if(l1.path===path)return{lbl:l1.lbl};for(const l2 of(l1.children||[])){if(l2.path===path)return{lbl:l2.lbl};for(const l3 of(l2.children||[])){if(l3.path===path)return{lbl:l3.lbl}}}}return{lbl:'Page'}}
function hasActive(l2){if(l2.path===activePath)return true;return(l2.children||[]).some(l3=>l3.path===activePath)}
function l1HasActive(l1){return(l1.children||[]).some(l2=>hasActive(l2))}

function go(path){
  const wasSales=SALES_PATHS.has(activePath);
  const wasOps=OPS_PATHS.has(activePath);
  const wasCust=CUST_PATHS.has(activePath);
  activePath=path;
  for(const s of NAV)for(const l1 of s.items){if(!l1.children)continue;if(l1HasActive(l1)){openL1=l1.id;for(const l2 of l1.children){if(l2.children&&l2.children.some(l3=>l3.path===activePath))openL2=l2.id}}}
  render();
  const body=document.getElementById('page-body');
  if(SALES_PATHS.has(path)){
    if(!wasSales||body.dataset.page!=='sales'){
      destroyCharts();if(scrollSpyCleanup){scrollSpyCleanup();scrollSpyCleanup=null}
      body.dataset.page='sales';body.innerHTML=buildSalesPerf();
      requestAnimationFrame(()=>{initCharts();initScrollSpy()});
    }
    const secId=PATH_TO_SEC[path];
    setTimeout(()=>{const el=document.getElementById(secId);if(el)el.scrollIntoView({behavior:'smooth',block:'start'})},80);
  }else if(OPS_PATHS.has(path)){
    if(!wasOps||body.dataset.page!=='ops'){
      destroyCharts();if(scrollSpyCleanup){scrollSpyCleanup();scrollSpyCleanup=null}
      body.dataset.page='ops';body.innerHTML=buildOpsQuality();
      requestAnimationFrame(()=>{initOpsCharts();initScrollSpy()});
    }
    const secId=PATH_TO_OPS_SEC[path];

      destroyCharts();if(scrollSpyCleanup){scrollSpyCleanup();scrollSpyCleanup=null}
      body.dataset.page='cust';body.innerHTML=buildCustomerInsights();
      requestAnimationFrame(()=>{initCustCharts();initScrollSpy()});
    }
    const secId=PATH_TO_CUST_SEC[path];
    setTimeout(()=>{const el=document.getElementById(secId);if(el)el.scrollIntoView({behavior:'smooth',block:'start'})},80);
  }else{
    destroyCharts();if(scrollSpyCleanup){scrollSpyCleanup();scrollSpyCleanup=null}
    body.dataset.page='';

function destroyCharts(){Object.values(chartInstances).forEach(c=>{try{c.destroy()}catch(e){}});chartInstances={}}
function toggleL1(id){if(openL1===id){openL1=null;openL2=null}else{openL1=id;openL2=null}render()}
function toggleL2(id){openL2=openL2===id?null:id;render()}
function mkL3(items){return items.map(l3=>`<a class="l3-leaf${l3.path===activePath?' is-active':''}" onclick="go('${l3.path}')">${l3.lbl}</a>`).join('')}
function mkL2(items){return items.map(l2=>{const isLeaf=!l2.children,selfActive=l2.path===activePath,grpActive=!isLeaf&&l2.children.some(l3=>l3.path===activePath),isOpen=openL2===l2.id;if(isLeaf)return`<div class="l2-group${selfActive?' g-active':''}"><a class="l2-leaf${selfActive?' is-active':''}" onclick="go('${l2.path}')"><span class="l2-lbl">${l2.lbl}</span></a></div>`;return`<div class="l2-group${(isOpen||grpActive)?' g-active':''}"><button class="l2-btn${isOpen?' is-open':''}" onclick="toggleL2('${l2.id}')"><span class="l2-lbl">${l2.lbl}</span><span class="l2-chev">${I.chevR}</span></button><div class="l3-panel${isOpen?' is-open':''}">${mkL3(l2.children)}</div></div>`}).join('')}
function mkL1(item){const isLeaf=!item.children,selfActive=item.path===activePath;if(isLeaf)return`<a class="l1-leaf${selfActive?' is-active':''}" onclick="go('${item.path}')"><span class="ico">${I[item.ico]||''}</span><span class="l1-body"><span class="l1-lbl">${item.lbl}</span>${item.sub?`<span class="l1-sub">${item.sub}</span>`:''}</span></a>`;const isOpen=openL1===item.id,hasAct=l1HasActive(item);return`<div><button class="l1-btn${(isOpen||hasAct)?' is-open':''}" onclick="toggleL1('${item.id}')"><span class="ico">${I[item.ico]||''}</span><span class="l1-body"><span class="l1-lbl">${item.lbl}</span></span><span class="chev">${I.chevD}</span></button><div class="l2-panel${isOpen?' is-open':''}">${mkL2(item.children)}</div></div>`}
function render(){document.getElementById('nav-root').innerHTML=NAV.map(s=>`<div class="nav-section"><span class="sec-title">${s.title}</span><div class="l1-list">${s.items.map(mkL1).join('')}</div></div>`).join('')}

function initScrollSpy(){
  const content=document.getElementById('content');
  function spy(){
    const anchors=[...document.querySelectorAll('.sp-anchor')];
    const cRect=content.getBoundingClientRect();
    let best=null,bestScore=-Infinity;
    for(const el of anchors){
      const r=el.getBoundingClientRect();
      const vis=Math.max(0,Math.min(r.bottom,cRect.bottom)-Math.max(r.top,cRect.top));
      const score=vis-Math.max(0,r.top-cRect.top)*0.5;
      if(score>bestScore){bestScore=score;best=el}
    }
    if(best){const p=best.dataset.path;if(p&&p!==activePath){activePath=p;render()}}
  }
  content.addEventListener('scroll',spy,{passive:true});
  scrollSpyCleanup=()=>content.removeEventListener('scroll',spy);
}

let P={cities:new Set(['dubai']),cos:new Set(['americana']),brands:new Set(['kfc']),outlets:new Set(['kfc-marina'])};
let A={cities:new Set(['dubai']),cos:new Set(['americana']),brands:new Set(['kfc']),outlets:new Set(['kfc-marina'])};
const cp=x=>({cities:new Set([...x.cities]),cos:new Set([...x.cos]),brands:new Set([...x.brands]),outlets:new Set([...x.outlets])});
const avCos=()=>SD.cos.filter(c=>c.cities.some(ci=>P.cities.has(ci)));
const avBrands=()=>{const ids=new Set(avCos().filter(c=>P.cos.has(c.id)).map(c=>c.id));return SD.brands.filter(b=>ids.has(b.co))};
const avOutlets=()=>{const ids=new Set(avBrands().filter(b=>P.brands.has(b.id)).map(b=>b.id));return SD.outlets.filter(o=>P.cities.has(o.city)&&ids.has(o.brand))};
function togCity(id,v){if(v){P.cities.add(id);SD.cos.filter(c=>c.cities.includes(id)&&!P.cos.has(c.id)).forEach(c=>{P.cos.add(c.id);SD.brands.filter(b=>b.co===c.id).forEach(b=>{P.brands.add(b.id);SD.outlets.filter(o=>o.brand===b.id&&o.city===id).forEach(o=>P.outlets.add(o.id))})});SD.outlets.filter(o=>o.city===id&&P.brands.has(o.brand)).forEach(o=>P.outlets.add(o.id))}else{P.cities.delete(id);SD.outlets.filter(o=>o.city===id).forEach(o=>P.outlets.delete(o.id));SD.cos.forEach(c=>{if(!c.cities.some(ci=>P.cities.has(ci))){P.cos.delete(c.id);SD.brands.filter(b=>b.co===c.id).forEach(b=>{P.brands.delete(b.id);SD.outlets.filter(o=>o.brand===b.id).forEach(o=>P.outlets.delete(o.id))})}})};renderSel()}
function togCo(id,v){if(v){P.cos.add(id);SD.brands.filter(b=>b.co===id).forEach(b=>{P.brands.add(b.id);SD.outlets.filter(o=>o.brand===b.id&&P.cities.has(o.city)).forEach(o=>P.outlets.add(o.id))})}else{P.cos.delete(id);SD.brands.filter(b=>b.co===id).forEach(b=>{P.brands.delete(b.id);SD.outlets.filter(o=>o.brand===b.id).forEach(o=>P.outlets.delete(o.id))})};renderSel()}

function togOutlet(id,v){if(v)P.outlets.add(id);else P.outlets.delete(id);renderSel()}
function saCity(v){if(v){SD.cities.forEach(c=>togCity(c.id,true))}else{[...P.cities].forEach(id=>togCity(id,false))};renderSel()}

function saBrand(v){const av=avBrands();if(v){av.forEach(b=>togBrand(b.id,true))}else{av.forEach(b=>togBrand(b.id,false))};renderSel()}

}
function col(title,items,sel,tFn,saFn){const allLbl={City:'All cities',Company:'All companies',Brand:'All brands'}[title];const sc=items.filter(i=>sel.has(i.id)).length,ac=items.length>0&&sc===items.length,an=sc>0&&!ac;return`<div class="sc-hdr">${title}</div><div class="sc-list"><label class="sc-row all-row"><input type="checkbox" class="cb-all" ${ac?'checked':''} ${an?'data-indet="1"':''} onchange="${saFn}(this.checked)"><span>${allLbl}</span></label>${items.map(i=>`<label class="sc-row"><input type="checkbox" ${sel.has(i.id)?'checked':''} onchange="${tFn}('${i.id}',this.checked)"><span>${i.name}</span></label>`).join('')}${items.length===0?'<div class="sc-empty">No options</div>':''}</div>`}
function colOutlet(items){const sc=items.filter(o=>P.outlets.has(o.id)).length,ac=items.length>0&&sc===items.length,an=sc>0&&!ac;return`<div class="sc-hdr">Outlet</div><div class="sc-list"><label class="sc-row all-row"><input type="checkbox" class="cb-all" ${ac?'checked':''} ${an?'data-indet="1"':''} onchange="saOutlet(this.checked)"><span>All outlets</span></label>${items.map(o=>`<label class="sc-row"><input type="checkbox" ${P.outlets.has(o.id)?'checked':''} onchange="togOutlet('${o.id}',this.checked)"><span class="o-lbl"><span>${o.name}</span><span class="o-meta">${o.code} · ${o.area}</span></span></label>`).join('')}${items.length===0?'<div class="sc-empty">Select brands first</div>':''}</div>`}
let selOpen=false;
function toggleSel(){selOpen?closeSel():openSel()}
function openSel(){selOpen=true;P=cp(A);renderSel();document.getElementById('sel-panel').style.display='block';document.getElementById('sel-overlay').style.display='block';document.getElementById('outletBtn').classList.add('open')}
function closeSel(){selOpen=false;document.getElementById('sel-panel').style.display='none';document.getElementById('sel-overlay').style.display='none';document.getElementById('outletBtn').classList.remove('open')}
function resetSel(){P=cp(A);renderSel()}
function applySel(){A=cp(P);closeSel();updateBadge();updateBanner()}
function badgeTxt(){const sel=SD.outlets.filter(o=>A.outlets.has(o.id)),n=sel.length;if(!n)return'No outlets';if(n===SD.outlets.length)return'All outlets';if(n===1){const o=sel[0];return`${o.name} · ${o.code} · ${o.area}`}const bIds=new Set(sel.map(o=>o.brand));if(bIds.size===1){const b=SD.brands.find(b=>b.id===[...bIds][0]),tot=SD.outlets.filter(o=>o.brand===b.id).length;return tot===n?`${b.name} · All outlets`:`${b.name} · ${n} outlets`}return`${bIds.size} brands · ${n} outlets`}
function updateBadge(){document.getElementById('badge-txt').textContent=badgeTxt()}
function updateBanner(){const n=A.outlets.size,bar=document.getElementById('fltBar');if(n!==1){bar.classList.add('show');document.getElementById('fltTxt').textContent=n===0?'⚠ No outlets selected':`Filtered: ${badgeTxt()}`}else bar.classList.remove('show')}
function clearFlt(){A={cities:new Set(['dubai']),cos:new Set(['americana']),brands:new Set(['kfc']),outlets:new Set(['kfc-marina'])};updateBadge();updateBanner()}

go('/analytics/sales/orders-sales');
